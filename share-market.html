<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Market Module - Alert Pro</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;padding:40px 20px;min-height:100vh}
    .container{max-width:800px;margin:0 auto}
    .back-btn{display:inline-block;color:#4ade80;text-decoration:none;margin-bottom:20px;font-size:16px}
    h1{text-align:center;margin-bottom:30px;font-size:36px}
    .btn{display:inline-block;background:#4ade80;color:#000;padding:15px 35px;border-radius:10px;text-decoration:none;font-weight:bold;font-size:16px;transition:0.3s}
    .btn:hover{background:#22c55e;transform:scale(1.05)}
    .card{background:#1a1a1a;border:2px solid #2a2a2a;border-radius:15px;padding:30px;margin-bottom:25px;text-align:center}
    .price-box{font-size:48px;font-weight:bold;color:#4ade80;margin:20px 0}
    .stock-name{font-size:24px;color:#aaa;margin-bottom:10px}
    .btn-refresh{background:#2a2a2a;color:#fff;padding:12px 25px;border:none;border-radius:8px;cursor:pointer;font-size:16px;margin-top:20px}
    .btn-refresh:hover{background:#3a3a3a}
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-btn">← Back to Dashboard</a>
    
    <a href="/share-strategy.html" class="btn" style="margin-bottom:20px;display:block">📝 Save Share Strategy</a>
    
    <h1>📈 Share Market Module</h1>
    
    <div class="card">
      <div class="stock-name">NIFTY 50</div>
      <div class="price-box" id="nifty-price">Loading...</div>
      <button class="btn-refresh" onclick="getPrice()">🔄 Refresh Price</button>
    </div>
    
    <div class="card">
      <div class="stock-name">RELIANCE</div>
      <div class="price-box" id="reliance-price">Loading...</div>
    </div>
    
    <div class="card">
      <div class="stock-name">TCS</div>
      <div class="price-box" id="tcs-price">Loading...</div>
    </div>
  </div>

  <script>
    async function getPrice() {
      try {
        const res = await fetch('/api/stock');
        const data = await res.json();
        document.getElementById('nifty-price').textContent = '₹' + data.nifty;
        document.getElementById('reliance-price').textContent = '₹' + data.reliance;
        document.getElementById('tcs-price').textContent = '₹' + data.tcs;
      } catch(e) {
        document.getElementById('nifty-price').textContent = 'Error';
      }
    }
    getPrice();
    setInterval(getPrice, 30000);
  </script>
</body>
</html>
