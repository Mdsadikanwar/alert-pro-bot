<!DOCTYPE html>
<html>
<head>
  <title>AlertPro - Backtest Lab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial; background: #0a0e1a; color: #e2e8f0; padding: 15px; }
    .header { display: flex; align-items: center; margin-bottom: 20px; gap: 10px; }
    .back { background: #1e293b; border: none; color: #3b82f6; padding: 8px 12px; border-radius: 8px; cursor: pointer; text-decoration: none; font-size: 14px; }
    .header h1 { font-size: 20px; color: #8b5cf6; }
    .card { background: #131b2e; border: 1px solid #1e293b; padding: 18px; border-radius: 12px; margin-bottom: 15px; }
    .card h2 { font-size: 16px; margin-bottom: 12px; color: #8b5cf6; }
    select, input { width: 100%; padding: 10px; margin: 6px 0; background: #0f172a; border: 1px solid #334155; color: #fff; border-radius: 6px; }
    label { font-size: 13px; color: #94a3b8; display: block; margin-top: 8px; }
    button { background: #8b5cf6; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px; width: 100%; margin-top: 10px; font-weight: 600; }
    .flex { display: flex; gap: 8px; }
    .flex > * { flex: 1; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
    th, td { padding: 10px 6px; text-align: left; border-bottom: 1px solid #1e293b; }
    th { color: #94a3b8; font-size: 12px; }
    .buy { color: #10b981; font-weight: 600; }
    .sell { color: #ef4444; font-weight: 600; }
    .profit { color: #10b981; }
    .loss { color: #ef4444; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
    .stat-box { background: #0f172a; padding: 12px; border-radius: 8px; text-align: center; }
    .stat-box h3 { font-size: 11px; color: #64748b; margin-bottom: 5px; }
    .stat-box p { font-size: 20px; font-weight: 700; color: #3b82f6; }
    .loading { text-align: center; padding: 20px; color: #64748b; }
  </style>
</head>
<body>
  <div class="header">
    <a href="/" class="back">← Back</a>
    <h1>🔬 Backtest Lab</h1>
  </div>

  <div class="card">
    <h2>⚙️ Test Settings</h2>
    
    <label>Market Type</label>
    <select id="marketType" onchange="loadStrategies()">
      <option value="crypto">Crypto</option>
      <option value="stocks">Stocks</option>
    </select>
    
    <label>Strategy Select Karo</label>
    <select id="strategySelect">
      <option value="">Pehle strategy banao...</option>
    </select>
    
    <div class="flex">
      <div>
        <label>Start Date</label>
        <input id="startDate" type="date" />
      </div>
      <div>
        <label>End Date</label>
        <input id="endDate" type="date" />
      </div>
    </div>
    
    <button onclick="runBacktest()">▶️ Backtest Chalao</button>
  </div>

  <div class="card" id="resultsCard" style="display:none;">
    <h2>📊 Backtest Results</h2>
    
    <div class="stats-grid">
      <div class="stat-box">
        <h3>Total Signals</h3>
        <p id="totalSignals">0</p>
      </div>
      <div class="stat-box">
        <h3>Win Rate</h3>
        <p id="winRate">0%</p>
      </div>
      <div class="stat-box">
        <h3>Total P/L</h3>
        <p id="totalPL" class="profit">+0%</p>
      </div>
      <div class="stat-box">
        <h3>Best Trade</h3>
        <p id="bestTrade" class="profit">+0%</p>
      </div>
    </div>

    <table id="resultTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Signal</th>
          <th>Price</th>
          <th>P/L %</th>
        </tr>
      </thead>
      <tbody id="resultBody">
      </tbody>
    </table>
  </div>

<script>
// Default dates - Last 30 days
const today = new Date();
const thirtyDaysAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
document.getElementById('endDate').valueAsDate = today;
document.getElementById('startDate').valueAsDate = thirtyDaysAgo;

// Load saved strategies from localStorage
function loadStrategies() {
  const market = document.getElementById('marketType').value;
  const key = market === 'crypto' ? 'strategies_crypto' : 'strategies_stocks';
  const strategies = JSON.parse(localStorage.getItem(key) || '[]');
  
  const select = document.getElementById('strategySelect');
  select.innerHTML = '<option value="">Strategy choose karo...</option>';
  
  strategies.forEach(s => {
    const symbol = market === 'crypto' ? s.coin : s.stock;
    select.innerHTML += `<option value="${s.id}">${s.name} (${symbol})</option>`;
  });
}

// Run Backtest - REAL API CALL
async function runBacktest() {
  const market = document.getElementById('marketType').value;
  const strategyId = document.getElementById('strategySelect').value;
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  
  if(!strategyId) { alert('Pehle strategy select karo!'); return; }
  if(!startDate || !endDate) { alert('Date select karo!'); return; }
  
  // Strategy data nikalo
  const key = market === 'crypto' ? 'strategies_crypto' : 'strategies_stocks';
  const strategies = JSON.parse(localStorage.getItem(key) || '[]');
  const strategy = strategies.find(s => s.id == strategyId);
  
  if(!strategy) { alert('Strategy nahi mili!'); return; }
  
  document.getElementById('resultsCard').style.display = 'block';
  document.getElementById('resultBody').innerHTML = '<tr><td colspan="4" class="loading">Binance se data laa rahe hain... ⏳</td></tr>';
  
  try {
    const url = `/api/backtest?market=${market}&startDate=${startDate}&endDate=${endDate}&strategy=${encodeURIComponent(JSON.stringify(strategy))}`;
    const res = await fetch(url);
    const data = await res.json();
    
    if (!data.success) throw new Error(data.error);
    
    let html = '';
    if (data.trades.length === 0) {
      html = '<tr><td colspan="4" style="text-align:center; color:#64748b;">Is period mein koi signal nahi mila</td></tr>';
    } else {
      data.trades.forEach(t => {
        const plClass = t.pl >= 0 ? 'profit' : 'loss';
        const plSign = t.pl >= 0 ? '+' : '';
        html += `
          <tr>
            <td>${t.date}</td>
            <td class="${t.type === 'BUY' ? 'buy' : 'sell'}">${t.type}</td>
            <td>$${t.price.toLocaleString()}</td>
            <td class="${plClass}">${t.pl ? plSign + t.pl + '%' : '-'}</td>
          </tr>
        `;
      });
    }
    
    document.getElementById('resultBody').innerHTML = html;
    document.getElementById('totalSignals').innerText = data.signals;
    document.getElementById('winRate').innerText = data.winRate + '%';
    document.getElementById('totalPL').innerText = (data.totalPL >= 0 ? '+' : '') + data.totalPL + '%';
    document.getElementById('totalPL').className = data.totalPL >= 0 ? 'profit' : 'loss';
    document.getElementById('bestTrade').innerText = '+' + data.bestTrade + '%';
    
  } catch (error) {
    document.getElementById('resultBody').innerHTML = `<tr><td colspan="4" style="color:#ef4444; text-align:center;">Error: ${error.message}</td></tr>`;
  }
}

// Page load pe strategies load karo
loadStrategies();
</script>

</body>
</html>
