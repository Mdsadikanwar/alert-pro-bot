<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlertPro Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: #0a0e1a; 
      color: #e2e8f0; 
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { max-width: 480px; width: 100%; }
    .header { text-align: center; margin-bottom: 30px; }
    .logo { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; font-size: 14px; }
    .market-card { 
      background: rgba(19, 27, 46, 0.8); 
      border: 1px solid rgba(30, 41, 59, 0.6); 
      border-radius: 16px; padding: 24px; margin-bottom: 16px;
      text-decoration: none; display: block;
      transition: all 0.3s ease;
    }
    .market-card:hover { 
      border-color: #10b981; 
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.2);
    }
    .market-title { 
      font-size: 22px; font-weight: 700; 
      margin-bottom: 8px; display: flex; 
      align-items: center; justify-content: center; gap: 10px;
    }
    .market-desc { 
      text-align: center; color: #94a3b8; 
      font-size: 13px; 
    }
    .crypto .market-title { color: #f59e0b; }
    .stock .market-title { color: #10b981; }
    .stats { 
      display: grid; grid-template-columns: 1fr 1fr; 
      gap: 16px; margin-top: 24px; text-align: center;
    }
    .stat-num { font-size: 24px; font-weight: 700; color: #10b981; }
    .stat-label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🚨 AlertPro Terminal</div>
      <div class="subtitle">Select Market to Manage Strategies</div>
    </div>

    <a href="/crypto.html" class="market-card crypto">
      <div class="market-title">₿ CRYPTO</div>
      <div class="market-desc">BTC, ETH, Altcoins Signal Strategies</div>
    </a>

    <a href="/stock.html" class="market-card stock">
      <div class="market-title">📈 SHARE MARKET</div>
      <div class="market-desc">Nifty 50, Stocks Signal Strategies</div>
    </div>

    <div class="stats">
      <div>
        <div class="stat-num" id="cryptoCount">0</div>
        <div class="stat-label">Crypto Strategies</div>
      </div>
      <div>
        <div class="stat-num" id="stockCount">0</div>
        <div class="stat-label">Stock Strategies</div>
      </div>
    </div>
  </div>
</body>
</html>
