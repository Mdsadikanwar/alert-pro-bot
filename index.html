<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert Pro Dashboard</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Segoe UI',sans-serif;
      background:#0a0a0a;
      color:#fff;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:40px 20px
    }
    .container{max-width:800px;width:100%}
    h1{
      font-size:42px;
      margin-bottom:10px;
      text-align:center
    }
    .subtitle{
      text-align:center;
      color:#888;
      margin-bottom:50px;
      font-size:18px
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:25px
    }
    .card{
      background:#1a1a1a;
      border:2px solid #2a2a2a;
      border-radius:15px;
      padding:35px;
      text-align:center;
      transition:0.3s
    }
    .card:hover{
      border-color:#4ade80;
      transform:translateY(-5px)
    }
    .card h2{
      font-size:28px;
      margin-bottom:15px
    }
    .card p{
      color:#aaa;
      margin-bottom:25px;
      font-size:16px
    }
    .btn{
      display:inline-block;
      background:#4ade80;
      color:#000;
      padding:15px 35px;
      border-radius:10px;
      text-decoration:none;
      font-weight:bold;
      font-size:16px;
      transition:0.3s
    }
    .btn:hover{
      background:#22c55e;
      transform:scale(1.05)
    }
    .api-link{
      margin-top:20px;
      font-size:14px;
      color:#666
    }
    .api-link code{
      background:#2a2a2a;
      padding:4px 8px;
      border-radius:5px;
      color:#4ade80
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Alert Pro Dashboard</h1>
    <p class="subtitle">Live Price + Telegram Alert System</p>
    
    <div class="grid">
      <!-- Crypto Module Card -->
      <div class="card">
        <h2>📊 Crypto Module</h2>
        <p>Bitcoin, Ethereum Live Price + Telegram Alerts</p>
        <a href="/crypto.html" class="btn">Open Crypto Module</a>
        <div class="api-link">API: <code>/api</code></div>
      </div>

      <!-- Share Market Module Card -->
      <div class="card">
        <h2>📈 Share Market Module</h2>
        <p>NSE/BSE Stocks Live Price + Price Alerts</p>
        <a href="/share-market.html" class="btn">Open Share Market Module</a>
        <div class="api-link">NIFTY, RELIANCE, TCS</div>
      </div>
    </div>
  </div>
</body>
</html>
