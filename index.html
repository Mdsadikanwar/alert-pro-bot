<!DOCTYPE html>
<html>
<head>
  <title>AlertPro - Main Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial; background: #0a0e1a; color: #e2e8f0; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 400px; width: 100%; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 32px; margin-bottom: 8px; }
    .header p { color: #64748b; font-size: 14px; }
    .market-btn { background: #131b2e; border: 2px solid #1e293b; padding: 30px 20px; border-radius: 16px; margin-bottom: 20px; cursor: pointer; transition: all 0.3s; text-align: center; text-decoration: none; display: block; }
    .market-btn:hover { border-color: #3b82f6; transform: translateY(-5px); background: #1a2540; }
    .market-btn h2 { font-size: 24px; margin-bottom: 8px; }
    .market-btn p { color: #94a3b8; font-size: 13px; }
    .crypto-btn h2 { color: #f59e0b; }
    .stock-btn h2 { color: #10b981; }
    .stats { display: flex; justify-content: space-around; margin-top: 30px; text-align: center; }
    .stat { font-size: 12px; color: #64748b; }
    .stat strong { display: block; font-size: 20px; color: #3b82f6; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚨 AlertPro Terminal</h1>
      <p>Select Market to Manage Strategies</p>
    </div>

    <a href="/crypto.html" class="market-btn crypto-btn">
      <h2>₿ CRYPTO</h2>
      <p>BTC, ETH, Altcoins Signal Strategies</p>
    </a>

    <a href="/stocks.html" class="market-btn stock-btn">
      <h2>📈 SHARE MARKET</h2>
      <p>Nifty 50, Stocks Signal Strategies</p>
    </a>

    <div class="stats">
      <div class="stat">
        <strong id="cryptoCount">0</strong>
        Crypto Strategies
      </div>
      <div class="stat">
        <strong id="stockCount">0</strong>
        Stock Strategies
      </div>
    </div>
  </div>

<script>
// Count dikhane ke liye
function updateCounts() {
  const crypto = JSON.parse(localStorage.getItem('strategies_crypto') || '[]');
  const stocks = JSON.parse(localStorage.getItem('strategies_stocks') || '[]');
  document.getElementById('cryptoCount').innerText = crypto.length;
  document.getElementById('stockCount').innerText = stocks.length;
}
updateCounts();
</script>

</body>
</html>
