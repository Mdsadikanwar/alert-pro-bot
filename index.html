<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AlertPro Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow-x: hidden; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: #0a0e1a; 
      color: #e2e8f0; 
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container { max-width: 500px; width: 100%; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 40px; }
    .logo { 
      font-size: 32px; font-weight: 800; margin-bottom: 8px;
      background: linear-gradient(135deg, #10b981, #34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #94a3b8; font-size: 14px; font-weight: 500; }
    .market-card { 
      background: rgba(19, 27, 46, 0.6); 
      backdrop-filter: blur(20px);
      border: 1px solid rgba(30, 41, 59, 0.8); 
      border-radius: 20px; 
      padding: 28px 24px; 
      margin-bottom: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: block;
    }
    .market-card:hover {
      border-color: #10b981;
      transform: translateY(-4px);
      box-shadow: 0 10px 40px rgba(16, 185, 129, 0.2);
    }
    .market-card:active { transform: scale(0.98); }
    .market-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      text-align: center;
    }
    .crypto-title { color: #f59e0b; }
    .share-title { color: #10b981; }
    .market-desc {
      color: #94a3b8;
      font-size: 13px;
      text-align: center;
      font-weight: 500;
    }
    .share-card { opacity: 0.6; cursor: not-allowed; }
    .share-card:hover { transform: none; border-color: rgba(30, 41, 59, 0.8); box-shadow: none; }
    .badge {
      display: inline-block;
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 6px;
      margin-top: 8px;
      font-weight: 700;
    }
    .footer {
      text-align: center;
      margin-top: 40px;
      color: #475569;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🔔 AlertPro Terminal</div>
      <div class="subtitle">Select Market to Manage Strategies</div>
    </div>

    <a href="crypto.html" class="market-card">
      <div class="market-title crypto-title">₿ CRYPTO</div>
      <div class="market-desc">BTC, ETH, Altcoins • Real-time Signal Strategies</div>
    </a>

    <div class="market-card share-card">
      <div class="market-title share-title">📈 SHARE MARKET</div>
      <div class="market-desc">Nifty 50, Bank Nifty • Professional Trading Setup</div>
      <div style="text-align: center;"><span class="badge">COMING SOON</span></div>
    </div>

    <div class="footer">Powered by AlertPro AI • v2.0</div>
  </div>
</body>
</html>
