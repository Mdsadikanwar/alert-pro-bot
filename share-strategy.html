<!DOCTYPE html>
<html>
<head>
    <title>Share Market Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; max-width: 500px; margin: 50px auto; }
        h1 { color: #22c55e; }
        .status { margin-top: 20px; padding: 15px; background: #334155; border-radius: 8px; }
        .success { color: #22c55e; }
        button { background: #22c55e; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📈 Share Market Alert Bot</h1>
        <p>Nifty 50 EMA Crossover Strategy</p>
        <div class="status">
            <p>Status: <span class="success">Active ✅</span></p>
            <p>Bot har 15 minute mein Nifty check karta hai</p>
            <p>Crossover pe Telegram alert bhejta hai</p>
        </div>
        <button onclick="testBot()">Test Bot Now</button>
        <p id="result"></p>
    </div>

    <script>
        async function testBot() {
            document.getElementById('result').innerText = 'Testing...';
            const res = await fetch('/api/share');
            const data = await res.json();
            document.getElementById('result').innerText = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
