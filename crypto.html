<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Crypto Strategies Pro Max</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 16px;
    }

    .back-btn {
      background: transparent;
      border: none;
      color: #94a3b8;
      font-size: 16px;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 700;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      padding: 14px 8px;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(51, 65, 85, 0.8);
      border-radius: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .tab.active {
      background: #10b981;
      color: #000;
      border-color: #10b981;
    }

    .card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(51, 65, 85, 0.8);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sentiment-labels {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .meter-bg {
      width: 100%;
      height: 10px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    #meter-fill {
      height: 100%;
      background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981);
      width: 46%;
      transition: width 0.5s ease;
      border-radius: 10px;
    }

    #sentiment-text {
      font-size: 20px;
      font-weight: 800;
      color: #f59e0b;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tip-box {
      background: rgba(15, 23, 42, 0.8);
      border-left: 3px solid #3b82f6;
      padding: 14px;
      border-radius: 8px;
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .dropdowns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .dropdown-group label {
      font-size: 12px;
      color: #94a3b8;
      display: block;
      margin-bottom: 6px;
    }

    select {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 600;
    }

    .price-card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(51, 65, 85, 0.8);
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
    }

    #crypto-price {
      font-size: 48px;
      font-weight: 800;
      color: #10b981;
      margin-bottom: 8px;
    }

    #crypto-change {
      font-size: 16px;
      font-weight: 600;
      color: #ef4444;
    }

    .update-time {
      text-align: center;
      font-size: 11px;
      color: #475569;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
  
  <div class="title-row">
    <span>📊</span>
    <span>Crypto Strategies Pro Max</span>
  </div>

  <div class="tabs">
    <div class="tab active">
      <span>📊</span>
      <span>Sentiment</span>
    </div>
    <div class="tab">
      <span>⚡</span>
      <span>Strategy</span>
    </div>
    <div class="tab">
      <span>📄</span>
      <span>Paper</span>
    </div>
    <div class="tab">
      <span>📈</span>
      <span>Backtest</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <span>📊</span>
      <span>Market Trend & Sentiment Meter</span>
    </div>

    <div class="sentiment-labels">
      <span>🐻 Bearish</span>
      <span>😐 Neutral</span>
      <span>🐂 Bullish</span>
    </div>

    <div class="meter-bg">
      <div id="meter-fill"></div>
    </div>

    <div id="sentiment-text">😐 NEUTRAL - 46%</div>

    <div class="tip-box" id="tip-text">
      💡 Sideways market. Range trading karo. Support/Resistance pe trade lo. Breakout ka wait karo.
    </div>

    <div class="dropdowns">
      <div class="dropdown-group">
        <label>Coin Chuno</label>
        <select id="coin-select">
          <option value="bitcoin">Bitcoin BTC</option>
          <option value="ethereum">Ethereum ETH</option>
          <option value="solana">Solana SOL</option>
        </select>
      </div>
      <div class="dropdown-group">
        <label>Timeframe</label>
        <select id="timeframe">
          <option value="1d">Daily</option>
          <option value="1h">Hourly</option>
          <option value="15m">15 Min</option>
        </select>
      </div>
    </div>
  </div>

  <div class="price-card">
    <div id="crypto-price">$58,253</div>
    <div id="crypto-change">▼ 1.44% (24h)</div>
    <div class="update-time" id="last-update"></div>
  </div>

  <script>
    const tips = {
      "STRONG BULLISH": "💡 Strong uptrend. Buy on dips. Trail your SL. Momentum coins karo.",
      "BULLISH": "💡 Uptrend hai. Buying opportunity dhundo. Support pe entry lo.",
      "NEUTRAL": "💡 Sideways market. Range trading karo. Support/Resistance pe trade lo. Breakout ka wait karo.",
      "BEARISH": "💡 Downtrend hai. Short opportunities dhundo. Resistance pe sell karo.",
      "STRONG BEARISH": "💡 Strong downtrend. Avoid buying. Sirf short karo with strict SL."
    };

    // LIVE CRYPTO DATA FUNCTION
    async function updateCryptoData() {
      try {
        const coin = document.getElementById('coin-select').value;
        const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coin}`);
        const data = await res.json();

        if(data) {
          const price = data.market_data.current_price.usd;
          const change = data.market_data.price_change_percentage_24h;
          
          // Price update
          document.getElementById('crypto-price').innerText = '$' + price.toLocaleString('en-US');
          
          // Change update
          const changeEl = document.getElementById('crypto-change');
          const changeSymbol = change > 0 ? '▲' : '▼';
          changeEl.innerText = `${changeSymbol} ${Math.abs(change).toFixed(2)}% (24h)`;
          changeEl.style.color = change > 0 ? '#10b981' : '#ef4444';
          document.getElementById('crypto-price').style.color = change > 0 ? '#10b981' : '#ef4444';
          
          // Sentiment calculation
          let sentiment = "NEUTRAL";
          let percent = 50;
          if(change > 5) { sentiment = "STRONG BULLISH"; percent = 85; }
          else if(change > 2) { sentiment = "BULLISH"; percent = 70; }
          else if(change < -5) { sentiment = "STRONG BEARISH"; percent = 15; }
          else if(change < -2) { sentiment = "BEARISH"; percent = 30; }
          else { sentiment = "NEUTRAL"; percent = 46; }
          
          const emoji = percent > 60 ? '🐂' : percent < 40 ? '🐻' : '😐';
          document.getElementById('sentiment-text').innerText = `${emoji} ${sentiment} - ${percent}%`;
          document.getElementById('meter-fill').style.width = `${percent}%`;
          
          // Sentiment color
          const sentimentEl = document.getElementById('sentiment-text');
          if(percent > 60) sentimentEl.style.color = '#10b981';
          else if(percent < 40) sentimentEl.style.color = '#ef4444';
          else sentimentEl.style.color = '#f59e0b';
          
          // Tip update
          document.getElementById('tip-text').innerText = tips[sentiment];
          
          // Update time
          const now = new Date();
          document.getElementById('last-update').innerText = `Last updated: ${now.toLocaleTimeString('en-IN')}`;
        }
      } catch (err) {
        document.getElementById('last-update').innerText = 'Connection failed. Retrying...';
        console.log('API Error:', err);
      }
    }

    // Coin change pe data update
    document.getElementById('coin-select').addEventListener('change', updateCryptoData);

    // Page load pe chalaao
    updateCryptoData();
    // Har 30 second mein refresh - CoinGecko ka rate limit hai
    setInterval(updateCryptoData, 30000);
  </script>
</body>
</html>
