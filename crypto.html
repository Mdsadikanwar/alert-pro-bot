<!DOCTYPE html>
<html>
<head>
  <title>AlphaTerminal Crypto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #0a0e1a; color: #fff; padding: 15px; }
    .header { margin-bottom: 15px; }
    .back { background: #1e293b; border: none; color: #f59e0b; padding: 8px 12px; border-radius: 8px; text-decoration: none; display: inline-block; }
    .card { background: #131b2e; border: 1px solid #1e293b; padding: 18px; border-radius: 12px; margin-bottom: 15px; }
    h1 { font-size: 20px; color: #f59e0b; margin-bottom: 15px; }
    h2 { font-size: 16px; color: #f59e0b; margin-bottom: 10px; }
    select { width: 100%; padding: 10px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: #fff; border-radius: 6px; }
    button { background: #f59e0b; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: 600; }
    .meter { height: 10px; background: #1e293b; border-radius: 5px; overflow: hidden; margin: 10px 0; }
    .fill { height: 100%; transition: width 0.5s; background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981); }
    #sentimentText { font-size: 18px; margin: 10px 0; font-weight: bold; }
    #sentimentAdvice { font-size: 14px; color: #cbd5e1; line-height: 1.5; }
    .price { font-size: 24px; color: #f59e0b; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="header">
    <a href="/" class="back">← Back to Home</a>
  </div>

  <div class="card">
    <h1>₿ Crypto Real Sentiment</h1>
    <select id="coinSelect" onchange="getData()">
      <option value="bitcoin">Bitcoin BTC</option>
      <option value="ethereum">Ethereum ETH</option>
      <option value="solana">Solana SOL</option>
      <option value="binancecoin">Binance BNB</option>
    </select>

    <div class="price" id="price">Loading...</div>

    <div style="display:flex; justify-content:space-between; font-size:12px; color:#94a3b8;">
      <span>😱 Fear</span>
      <span>😐 Neutral</span>
      <span>🚀 Greed</span>
    </div>
    <div class="meter">
      <div id="sentimentBar" class="fill" style="width:50%"></div>
    </div>

    <div id="sentimentText">⏳ Loading...</div>
    <div id="sentimentAdvice">CoinGecko se real data la raha hun...</div>

    <button onclick="getData()">🔄 Refresh Data</button>
  </div>

<script>
// Login check
const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
if (!user) window.location.href = '/login.html';

async function getData() {
  const coin = document.getElementById('coinSelect').value;
  document.getElementById('sentimentText').innerHTML = '⏳ Loading...';
  document.getElementById('price').innerHTML = 'Fetching...';

  try {
    const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coin}`);
    const data = await res.json();

    const price = data.market_data.current_price.usd;
    const change = data.market_data.price_change_percentage_24h;
    const high = data.market_data.high_24h.usd;
    const low = data.market_data.low_24h.usd;

    document.getElementById('price').innerHTML = `$${price.toLocaleString()}`;

    let score = 50 + (change * 3);
    score = Math.max(5, Math.min(95, score));

    let text, advice, color;
    if (change > 5) {
      text = '🚀 EXTREME GREED';
      advice = `${change.toFixed(2)}% up 24h. Strong pump! Buy dips, 3x max leverage.`;
      color = '#10b981';
    } else if (change > 2) {
      text = '📈 GREED';
      advice = `${change.toFixed(2)}% up 24h. Bullish. Long karo SL tight.`;
      color = '#34d399';
    } else if (change < -5) {
      text = '💀 EXTREME FEAR';
      advice = `${change.toFixed(2)}% down 24h. Crash! Short ya USDT hold.`;
      color = '#ef4444';
    } else if (change < -2) {
      text = '😱 FEAR';
      advice = `${change.toFixed(2)}% down 24h. Bearish. Short rally pe.`;
      color = '#f87171';
    } else {
      text = '😐 NEUTRAL';
      advice = `${change.toFixed(2)}% 24h. Range: $${low.toFixed(0)}-$${high.toFixed(0)}. Scalp karo.`;
      color = '#f59e0b';
    }

    document.getElementById('sentimentBar').style.width = score + '%';
    document.getElementById('sentimentText').innerHTML = `${text} - ${Math.round(score)}%`;
    document.getElementById('sentimentText').style.color = color;
    document.getElementById('sentimentAdvice').innerHTML = `💡 ${advice}`;

  } catch (err) {
    document.getElementById('sentimentText').innerHTML = '❌ Error';
    document.getElementById('sentimentAdvice').innerHTML = 'API fail. Net check karo ya 1 min baad try karo.';
    document.getElementById('price').innerHTML = 'Error';
  }
}

// Page load pe data lao
window.onload = getData;
// Har 60 sec auto refresh
setInterval(getData, 60000);
</script>
</body>
</html>
