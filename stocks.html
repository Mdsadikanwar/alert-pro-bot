<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Strategies Pro Max</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: #0a0e1a; 
      color: #e2e8f0; 
      padding: 20px;
    }
    .container { max-width: 500px; margin: 0 auto; }
    .card { 
      background: rgba(19, 27, 46, 0.6); 
      border: 1px solid rgba(30, 41, 59, 0.8); 
      border-radius: 16px; 
      padding: 20px; 
      margin-bottom: 16px;
    }
    .title { font-size: 24px; font-weight: 800; margin-bottom: 16px; text-align: center; }
    .price-box { text-align: center; margin-bottom: 20px; }
    #nifty-price { font-size: 36px; font-weight: 800; color: #10b981; }
    #nifty-change { font-size: 16px; font-weight: 600; margin-top: 4px; }
    .high-low { display: flex; justify-content: space-around; margin: 16px 0; font-size: 14px; }
    .sentiment-box { margin-top: 20px; }
    #sentiment-text { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 12px; }
    .meter { 
      width: 100%; 
      height: 12px; 
      background: #1e293b; 
      border-radius: 10px; 
      overflow: hidden;
    }
    #meter-fill { 
      height: 100%; 
      background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981); 
      width: 50%; 
      transition: width 0.5s ease;
    }
    .loading { text-align: center; color: #64748b; font-size: 12px; margin-top: 10px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { flex: 1; padding: 10px; background: #1e293b; border-radius: 8px; text-align: center; font-size: 14px; }
    .tab.active { background: #10b981; color: #000; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">📈 Stock Strategies Pro Max</div>
    
    <div class="tabs">
      <div class="tab active">Live</div>
      <div class="tab">Strategy</div>
      <div class="tab">Backtest</div>
      <div class="tab">Paper</div>
    </div>

    <div class="card">
      <div class="price-box">
        <div>NIFTY 50</div>
        <div id="nifty-price">--,---.--</div>
        <div id="nifty-change">Loading...</div>
      </div>
      
      <div class="high-low">
        <div>High: <span id="nifty-high">--,---</span></div>
        <div>Low: <span id="nifty-low">--,---</span></div>
      </div>

      <div class="sentiment-box">
        <div id="sentiment-text">Calculating...</div>
        <div class="meter">
          <div id="meter-fill"></div>
        </div>
      </div>
      
      <div class="loading" id="last-update">Fetching live data...</div>
    </div>
  </div>

  <script>
    // LIVE DATA FETCH KARNE KA CODE
    async function updateLiveData() {
      try {
        const res = await fetch('/api/share');
        const data = await res.json();

        if(data.success) {
          // 1. Price update
          document.getElementById('nifty-price').innerText = data.price.toLocaleString('en-IN');
          
          // 2. Change update with color
          const changeEl = document.getElementById('nifty-change');
          changeEl.innerText = `${data.change > 0 ? '▲' : '▼'} ${Math.abs(data.change).toFixed(2)}%`;
          changeEl.style.color = data.change > 0 ? '#10b981' : '#ef4444';
          document.getElementById('nifty-price').style.color = data.change > 0 ? '#10b981' : '#ef4444';
          
          // 3. High/Low update
          document.getElementById('nifty-high').innerText = data.high.toLocaleString('en-IN');
          document.getElementById('nifty-low').innerText = data.low.toLocaleString('en-IN');
          
          // 4. Sentiment update
          document.getElementById('sentiment-text').innerText = `${data.sentiment} - ${data.percent}%`;
          document.getElementById('meter-fill').style.width = `${data.percent}%`;
          
          // 5. Last update time
          const now = new Date();
          document.getElementById('last-update').innerText = `Last updated: ${now.toLocaleTimeString()}`;
          
        } else {
          document.getElementById('last-update').innerText = 'Error: ' + data.message;
        }
      } catch (err) {
        document.getElementById('last-update').innerText = 'Failed to fetch. Retrying...';
        console.log('API Error:', err);
      }
    }

    // Page load hote hi chalaao
    updateLiveData();
    // Har 15 second mein auto refresh
    setInterval(updateLiveData, 15000);
  </script>
</body>
</html>
