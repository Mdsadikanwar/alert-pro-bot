<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Strategy Notes - Alert Pro</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;padding:40px 20px;min-height:100vh}
    .container{max-width:700px;margin:0 auto}
    .back-btn{display:inline-block;color:#4ade80;text-decoration:none;margin-bottom:30px;font-size:16px}
    h1{text-align:center;margin-bottom:40px;font-size:36px}
    .form-card{background:#1a1a1a;border:2px solid #2a2a2a;border-radius:15px;padding:35px;margin-bottom:30px}
    .form-group{margin-bottom:20px}
    label{display:block;margin-bottom:8px;color:#4ade80;font-weight:bold;font-size:18px}
    input, textarea{width:100%;padding:15px;background:#0a0a0a;border:2px solid #2a2a2a;border-radius:8px;color:#fff;font-size:16px}
    textarea{resize:vertical;min-height:250px;font-family:'Courier New',monospace;line-height:1.6}
    .btn-save{width:100%;background:#4ade80;color:#000;padding:18px;border:none;border-radius:10px;font-size:20px;font-weight:bold;cursor:pointer;transition:0.3s}
    .btn-save:hover{background:#22c55e;transform:scale(1.02)}
    .strategy-list{margin-top:40px}
    .strategy-item{background:#1a1a1a;border-left:4px solid #4ade80;border-radius:8px;padding:25px;margin-bottom:20px}
    .strategy-title{font-size:22px;font-weight:bold;margin-bottom:12px;color:#4ade80}
    .strategy-script{color:#ddd;font-size:15px;line-height:1.8;white-space:pre-wrap;font-family:'Courier New',monospace;background:#0a0a0a;padding:15px;border-radius:8px;margin-top:10px}
    .success-msg{background:#22c55e;color:#000;padding:15px;border-radius:8px;margin-bottom:20px;text-align:center;font-weight:bold;display:none}
    small{color:#666}
  </style>
</head>
<body>
  <div class="container">
    <a href="/crypto.html" class="back-btn">← Back to Crypto Module</a>
    <h1>🚀 Crypto Strategy Notes</h1>
    <div id="success" class="success-msg">✅ Strategy Saved!</div>
    
    <div class="form-card">
      <form id="strategyForm">
        <div class="form-group">
          <label>Strategy Name</label>
          <input type="text" id="name" placeholder="e.g. BTC Scalping Strategy" required>
        </div>
        
        <div class="form-group">
          <label>Strategy Script / Logic</label>
          <textarea id="script" placeholder="AI से लिखवाई हुई पूरी strategy यहाँ paste कर दे...&#10;&#10;Example:&#10;1. RSI 30 से नीचे जाए तो buy&#10;2. Volume 20% बढ़े तो confirmation&#10;3. Stop loss 2% नीचे&#10;4. Target 5% ऊपर..." required></textarea>
        </div>
        
        <button type="submit" class="btn-save">💾 Save Strategy</button>
      </form>
    </div>
    
    <div class="strategy-list">
      <h2 style="margin-bottom:20px;color:#4ade80">📊 Saved Strategies</h2>
      <div id="savedList"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('strategyForm');
    const savedList = document.getElementById('savedList');
    const successMsg = document.getElementById('success');
    
    loadStrategies();
    
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const strategy = {
        id: Date.now(),
        name: document.getElementById('name').value,
        script: document.getElementById('script').value,
        date: new Date().toLocaleString('en-IN')
      };
      
      let strategies = JSON.parse(localStorage.getItem('cryptoStrategies')) || [];
      strategies.unshift(strategy);
      localStorage.setItem('cryptoStrategies', JSON.stringify(strategies));
      
      successMsg.style.display = 'block';
      setTimeout(() => successMsg.style.display = 'none', 3000);
      form.reset();
      loadStrategies();
    });
    
    function loadStrategies() {
      let strategies = JSON.parse(localStorage.getItem('cryptoStrategies')) || [];
      if(strategies.length === 0) {
        savedList.innerHTML = '<p style="color:#666;text-align:center">No strategies saved yet<br><small>AI से strategy बनवा के यहाँ save कर ले</small></p>';
        return;
      }
      savedList.innerHTML = strategies.map(s => `
        <div class="strategy-item">
          <div class="strategy-title">${s.name}</div>
          <small>Saved: ${s.date}</small>
          <div class="strategy-script">${s.script}</div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
